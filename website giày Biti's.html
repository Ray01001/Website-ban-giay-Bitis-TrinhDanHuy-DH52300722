<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giao diện Biti's</title>
    <link rel="stylesheet" href="StyleFigma.css">
</head>
<body>
    <!-- Logo Biti's -->
    <div class="logo">
        <img src="pic.1.png" alt="Logo Biti's">
    </div>

    <!-- Icon góc phải -->
    <div class="icons">
        <img src="pic.2.png" alt="Icon 1">
        <img src="pic.3.png" alt="Icon 2">
        <img src="pic.4.png" alt="Icon 3">
    </div>

    <!-- Thanh điều hướng -->
    <nav class="navbar">
        <ul>
            <li>TRANG CHỦ</li>
            <li>VỀ CHÚNG TÔI</li>
            <li>LIÊN HỆ</li>
            <li>GIÀY NAM</li>
            <li>GIÀY NỮ</li>
        </ul>
    </nav>

    <!-- Thanh ngang đỏ -->
    <div class="banner">
        <div class="banner-logo">
            <img src="Logo.H.png" alt="Logo H">
        </div>
        <h1>NÂNG NIU BÀN CHÂN VIỆT</h1>
    </div>

    <!-- Ảnh PC01 -->
    <div class="pc01">
        <img src="PC01.png" alt="PC01" >
    </div>
    <!-- Section BÁN CHẠY -->
    <div class="best-seller">
        <h2>BÁN CHẠY</h2>
    </div>

<!-- Ảnh giày -->
    <div class="shoe-image">
        <img src="pic.5.png" alt="Ảnh giày">
    </div>
</body>
</html>
